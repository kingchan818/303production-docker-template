server {
  listen 80;
  server_name server100.demo100.cloud;
  listen 443 ssl;
  ssl_certificate /etc/nginx/ssl/live/server100.demo100.cloud/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/live/server100.demo100.cloud/privkey.pem;
  ssl_protocols  TLSv1 TLSv1.1 TLSv1.2;
  location / {
    proxy_pass http://wordpress:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
  location /develop {
    proxy_pass https://server1.demo100.cloud/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}