version: '3'

services:
  nginx:
    image: nginx
    ports:
      - 80:80
      - 443:443
    depends_on:
      - db
      - wordpress
    volumes:
      - ./deleteme/nginx.conf /etc/nginx/nginx.conf
      - ./etc/letsencrypt/live/server100.demo100.cloud/privkey.pem /etc/nginx/ssl/live/server100.demo100.cloud/privkey.pem
      - ./etc/letsencrypt/live/server100.demo100.cloud/fullchain.pem /etc/nginx/ssl/live/server100.demo100.cloud/fullchain.pem

  wordpress:
    image: wordpress
    restart : always
    environment:
      - WORDPRESS_DB_USER=wpuser
      - WORDPRESS_DB_PASSWORD=wpuser@
      - WORDPRESS_DB_NAME=wordpress_db
      - WORDPRESS_DB_HOST=db:3306
    volumes:
      - /root/wordpress/html:/var/www/html
    # ports:
    #   - "8081:80"
    depends_on:
      - db

  db:
    container_name: wordpressdb
    image: mariadb
    restart : always
    environment:
      - MYSQL_ROOT_PASSWORD=asd123
      - MYSQL_USER=wpuser
      - MYSQL_PASSWORD=wpuser@
      - MYSQL_DATABASE=wordpress_db
    volumes:
      - /root/wordpress/database:/var/lib/mysql
  